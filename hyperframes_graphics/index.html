<!doctype html>
<html lang="en" data-resolution="landscape">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=JetBrains+Mono:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 1920px; height: 1080px; overflow: hidden;
        background: #0b0c0e; font-family: "Space Grotesk", -apple-system, sans-serif;
      }
      .mono { font-family: "JetBrains Mono", monospace; }
      #root { position: relative; width: 100%; height: 100%; }
      #root::before {
        content: ""; position: absolute; inset: 0;
        background-image: radial-gradient(rgba(255,255,255,0.05) 1px, transparent 1px);
        background-size: 26px 26px;
      }
      .stage {
        position: absolute; inset: 0; display: flex; align-items: center;
        justify-content: flex-start; padding-left: 6%;
      }
      .steps {
        position: relative; display: flex; flex-direction: column;
        align-items: flex-start; gap: 22px; width: 58%; max-width: 900px;
      }
      .step {
        position: relative; display: flex; align-items: center; gap: 22px;
        width: 100%; box-sizing: border-box; padding: 28px 36px; border-radius: 18px;
        background: #131a1d;
        box-shadow: 0 14px 40px -14px #2dd4bf60, inset 0 1px 0 rgba(255,255,255,0.06),
          inset 0 0 0 1px #2dd4bf40;
      }
      .badge {
        flex: 0 0 auto; width: 64px; height: 64px; border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        background: #0f2321; border: 2px solid #2dd4bf; color: #2dd4bf;
        font-family: "JetBrains Mono", monospace; font-size: 30px; font-weight: 700;
      }
      .text .eyebrow {
        font-family: "JetBrains Mono", monospace; font-size: 18px; font-weight: 600;
        letter-spacing: 0.12em; text-transform: uppercase; color: #2dd4bf;
        margin-bottom: 6px;
      }
      .text .label { font-size: 38px; font-weight: 700; color: #fff; line-height: 1.25; letter-spacing: -0.01em; }
      .text .detail { font-size: 24px; color: #b9c7c5; margin-top: 4px; }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="20"
      data-width="1920"
      data-height="1080"
    >
      <div class="stage">
        <div class="steps">
          <div id="step-1" class="clip step" data-start="0" data-duration="20" data-track-index="1">
            <div class="badge">1</div>
            <div class="text">
              <div class="eyebrow">Step 01 / 03</div>
              <div class="label">MCP Tool Connections</div>
              <div class="detail">Schema-based plug in and out for tools</div>
            </div>
          </div>
          <div id="step-2" class="clip step" data-start="6" data-duration="14" data-track-index="2">
            <div class="badge">2</div>
            <div class="text">
              <div class="eyebrow">Step 02 / 03</div>
              <div class="label">Agent to Agent Protocol</div>
              <div class="detail">Same schema lets agents communicate</div>
            </div>
          </div>
          <div id="step-3" class="clip step" data-start="12" data-duration="8" data-track-index="3">
            <div class="badge">3</div>
            <div class="text">
              <div class="eyebrow">Step 03 / 03</div>
              <div class="label">Guardrails</div>
              <div class="detail">Input, output, and tool level checks</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });
      tl.from("#step-1", { y: 24, opacity: 0, duration: 0.6, ease: "power3.out" }, 0);
      tl.from("#step-2", { y: 24, opacity: 0, duration: 0.6, ease: "power3.out" }, 6);
      tl.from("#step-3", { y: 24, opacity: 0, duration: 0.6, ease: "power3.out" }, 12);
      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
